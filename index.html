<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StoryLine — AI Language Coach</title>
  <meta name="description" content="StoryLine is a personalized AI language coach that teaches through immersive story worlds. Privacy policy, support, and terms.">
  <style>
    :root {
      --bg: #0b1020;
      --surface: #121a2e;
      --surface-2: #1a2440;
      --text: #eef2ff;
      --muted: #9aa8c7;
      --accent: #6ea8ff;
      --accent-2: #8b5cf6;
      --border: rgba(255,255,255,.08);
      --max: 820px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, rgba(110,168,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 90% 0%, rgba(139,92,246,.14), transparent 55%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: var(--accent); }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(11,16,32,.82);
      border-bottom: 1px solid var(--border);
    }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 20px; }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      flex-wrap: wrap;
    }
    .brand { font-weight: 700; letter-spacing: .2px; }
    .links { display: flex; flex-wrap: wrap; gap: 14px; font-size: 14px; }
    .links a { color: var(--muted); text-decoration: none; }
    .links a:hover { color: var(--text); }
    main { padding: 28px 0 64px; }
    .hero { padding: 36px 0 18px; }
    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: .4px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(110,168,255,.35);
      border-radius: 999px;
      padding: 6px 10px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.15;
      margin: 0 0 12px;
    }
    .lead { color: var(--muted); font-size: 1.05rem; max-width: 62ch; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin: 28px 0 10px;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent), var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }
    .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .card p { margin: 0; color: var(--muted); font-size: .95rem; }
    section {
      margin-top: 42px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    h2 { font-size: 1.55rem; margin: 0 0 10px; }
    h3 { font-size: 1.05rem; margin: 22px 0 8px; }
    p, li { color: #d7def2; }
    ul { padding-left: 1.2rem; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-top: 14px;
    }
    .lang-toggle {
      display: inline-flex;
      gap: 8px;
      margin-bottom: 14px;
    }
